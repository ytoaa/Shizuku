cd Shizuku

mkdir -p .github/workflows

cat > .github/workflows/build-custom-shizuku.yml <<'EOF'
name: Build Custom Shizuku

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "New Android applicationId"
        required: true
        default: "to.solame.privileged.api"
      app_name:
        description: "New app display name"
        required: true
        default: "Solame Privileged"
      permission_prefix:
        description: "New manager permission prefix"
        required: true
        default: "to.solame.manager.permission"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Patch package name, app name and permissions
        env:
          NEW_APP_ID: ${{ inputs.app_id }}
          NEW_APP_NAME: ${{ inputs.app_name }}
          NEW_PERMISSION_PREFIX: ${{ inputs.permission_prefix }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os

          new_app_id = os.environ["NEW_APP_ID"]
          new_app_name = os.environ["NEW_APP_NAME"]
          new_permission_prefix = os.environ["NEW_PERMISSION_PREFIX"]

          roots = [
              "manager",
              "server",
              "shell",
              "starter",
              "common",
              "api",
              "provider",
              "shared",
          ]

          exts = {
              ".gradle", ".kts", ".kt", ".java", ".xml", ".aidl",
              ".properties", ".json", ".txt", ".md", ".c", ".cpp", ".h"
          }

          changed = []

          for root in roots:
              base = Path(root)
              if not base.exists():
                  continue

              for path in base.rglob("*"):
                  if not path.is_file():
                      continue
                  if "build" in path.parts or ".git" in path.parts:
                      continue
                  if path.suffix.lower() not in exts:
                      continue

                  try:
                      text = path.read_text(encoding="utf-8")
                  except UnicodeDecodeError:
                      continue

                  old = text

                  text = text.replace("moe.shizuku.privileged.api", new_app_id)
                  text = text.replace("moe.shizuku.manager.permission.", new_permission_prefix + ".")

                  if path.name == "strings.xml":
                      text = text.replace(
                          '<string name="app_name">Shizuku</string>',
                          f'<string name="app_name">{new_app_name}</string>'
                      )
                      text = text.replace(
                          '<string name="app_name" translatable="false">Shizuku</string>',
                          f'<string name="app_name" translatable="false">{new_app_name}</string>'
                      )

                  if text != old:
                      path.write_text(text, encoding="utf-8")
                      changed.append(str(path))

          print("changed files:")
          for item in changed:
              print(item)
          PY

      - name: Check forbidden original identifiers
        run: |
          set +e
          grep -RIn \
            "moe.shizuku.privileged.api\|moe.shizuku.manager.permission\|<string name=\"app_name\">Shizuku</string>\|<string name=\"app_name\" translatable=\"false\">Shizuku</string>" \
            manager server shell starter common api provider shared \
            --exclude-dir=build \
            --exclude-dir=.git
          FOUND="$?"
          set -e

          if [ "$FOUND" = "0" ]; then
            echo "Original identifiers still found. Please inspect and patch them manually."
            exit 1
          fi

      - name: Build debug APK
        run: ./gradlew :manager:assembleDebug --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          find manager/build/outputs/apk -type f -name "*.apk" -print -exec cp {} artifacts/ \;
          ls -lah artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-shizuku-debug-apk
          path: artifacts/*.apk
          if-no-files-found: error
EOF

git add .github/workflows/build-custom-shizuku.yml
git commit -m "add custom Shizuku GitHub Actions build"
git push
