name: Verify Original Shizuku Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Shizuku
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Show repository and signing state
        run: |
          echo "=== repository ==="
          pwd
          git rev-parse --short HEAD
          git status --short

          echo
          echo "=== root files ==="
          ls -lah

          echo
          echo "=== signing.properties ==="
          if [ -f signing.properties ]; then
            ls -lah signing.properties
            cat signing.properties
          else
            echo "signing.properties not found"
          fi

          echo
          echo "=== key.jks ==="
          if [ -f key.jks ]; then
            ls -lah key.jks
          else
            echo "key.jks not found"
          fi

          echo
          echo "=== signing.gradle ==="
          sed -n '1,160p' signing.gradle

          echo
          echo "=== manager/build.gradle signing lines ==="
          grep -n "signingConfigs\|buildTypes\|apply from\|preDebugBuild\|preReleaseBuild" manager/build.gradle || true

      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true

      - name: Build original manager debug APK only
        run: |
          chmod +x ./gradlew
          ./gradlew :manager:assembleDebug \
            --stacktrace \
            --info \
            --no-daemon \
            --no-configuration-cache

      - name: Collect APK and reports
        if: always()
        run: |
          mkdir -p out/apk out/reports

          find manager/build/outputs/apk -type f -name "*.apk" -exec cp -v {} out/apk/ \; || true

          if [ -d build/reports ]; then
            cp -a build/reports out/reports/root-reports || true
          fi

          if [ -d manager/build/reports ]; then
            cp -a manager/build/reports out/reports/manager-reports || true
          fi

          echo
          echo "=== collected files ==="
          find out -type f -print || true

          echo
          echo "=== apk dir ==="
          ls -lah out/apk || true

      - name: Upload original build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: original-shizuku-debug-output
          path: out/
