name: Verify Original Shizuku Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Shizuku
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Diagnose before cleanup
        run: |
          set -euo pipefail

          echo "=== pwd ==="
          pwd

          echo
          echo "=== git commit ==="
          git rev-parse --short HEAD
          git status --short

          echo
          echo "=== workflow files ==="
          find .github/workflows -type f -maxdepth 2 -print -exec sed -n '1,220p' {} \;

          echo
          echo "=== root files before cleanup ==="
          ls -lah

          echo
          echo "=== signing.gradle ==="
          sed -n '1,200p' signing.gradle

          echo
          echo "=== signing.properties before cleanup ==="
          if [ -f signing.properties ]; then
            cat signing.properties
          else
            echo "signing.properties not found"
          fi

          echo
          echo "=== key.jks before cleanup ==="
          if [ -f key.jks ]; then
            ls -lah key.jks
            file key.jks || true
            xxd -l 160 key.jks || true
          else
            echo "key.jks not found"
          fi

      - name: Force original debug signing fallback
        run: |
          set -euo pipefail

          rm -f signing.properties key.jks custom-debug.jks

          echo "=== after cleanup ==="
          ls -lah signing.properties key.jks custom-debug.jks 2>/dev/null || true

          if [ -f signing.properties ]; then
            echo "ERROR: signing.properties still exists"
            cat signing.properties
            exit 1
          fi

          echo "OK: signing.properties is absent."
          echo "Shizuku signing.gradle should now use Android debug signing fallback."

      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true

      - name: Build original manager debug APK only
        run: |
          set -euo pipefail
          chmod +x ./gradlew

          if [ -f signing.properties ]; then
            echo "ERROR: signing.properties was recreated before build"
            cat signing.properties
            exit 1
          fi

          ./gradlew :manager:assembleDebug \
            --stacktrace \
            --info \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache

      - name: Diagnose after build
        if: always()
        run: |
          echo "=== signing files after build ==="
          find . -maxdepth 5 -type f \( \
            -name 'signing.properties' -o \
            -name 'key.jks' -o \
            -name '*.jks' -o \
            -name '*.keystore' -o \
            -name '*.p12' -o \
            -name '*.pfx' \
          \) -print -exec ls -lah {} \; || true

          echo
          echo "=== APK outputs ==="
          find manager/build/outputs/apk -type f -name "*.apk" -print || true

      - name: Collect APK and reports
        if: always()
        run: |
          mkdir -p out/apk out/reports

          find manager/build/outputs/apk -type f -name "*.apk" -exec cp -v {} out/apk/ \; || true

          if [ -d build/reports ]; then
            cp -a build/reports out/reports/root-reports || true
          fi

          if [ -d manager/build/reports ]; then
            cp -a manager/build/reports out/reports/manager-reports || true
          fi

          find out -type f -print || true
          ls -lah out/apk || true

      - name: Upload original build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: original-shizuku-debug-output
          path: out/
