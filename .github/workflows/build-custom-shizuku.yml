name: Verify Original Shizuku Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Shizuku
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Diagnose repository signing state
        run: |
          set -euo pipefail

          echo "=== pwd ==="
          pwd

          echo
          echo "=== git commit ==="
          git rev-parse --short HEAD
          git status --short

          echo
          echo "=== root files ==="
          ls -lah

          echo
          echo "=== git tracked signing/key-like files ==="
          git ls-files | grep -Ei '(^|/)(signing\.properties|key\.jks|.*\.jks|.*\.keystore|.*\.p12|.*\.pfx)$' || true

          echo
          echo "=== find signing/key-like files before build ==="
          find . -maxdepth 4 -type f \( \
            -name 'signing.properties' -o \
            -name 'key.jks' -o \
            -name '*.jks' -o \
            -name '*.keystore' -o \
            -name '*.p12' -o \
            -name '*.pfx' \
          \) -print -exec ls -lah {} \;

          echo
          echo "=== signing.properties content ==="
          if [ -f signing.properties ]; then
            sed -n '1,120p' signing.properties
          else
            echo "signing.properties not found"
          fi

          echo
          echo "=== key.jks type and first bytes ==="
          if [ -f key.jks ]; then
            file key.jks || true
            xxd -l 160 key.jks || true
          else
            echo "key.jks not found"
          fi

          echo
          echo "=== signing.gradle ==="
          sed -n '1,200p' signing.gradle

          echo
          echo "=== manager/build.gradle signing/build type refs ==="
          grep -n "signingConfigs\|buildTypes\|apply from\|preDebugBuild\|preReleaseBuild\|assemble" manager/build.gradle || true

          echo
          echo "=== all references to signing.properties / key.jks / KEYSTORE_FILE ==="
          grep -RIn "signing\.properties\|key\.jks\|KEYSTORE_FILE\|KEYSTORE_PASSWORD\|KEYSTORE_ALIAS" . \
            --exclude-dir=.git \
            --exclude-dir=build \
            --exclude-dir=.gradle || true

      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true

      - name: Require original debug signing fallback
        run: |
          set -euo pipefail

          echo "=== signing fallback guard ==="

          if [ -f signing.properties ]; then
            echo "ERROR: signing.properties exists."
            echo "Shizuku signing.gradle will use KEYSTORE_FILE instead of Android debug signing."
            echo
            echo "Current signing.properties:"
            cat signing.properties
            exit 1
          fi

          echo "OK: signing.properties is absent."
          echo "Original signing.gradle should fallback to Android debug signing."

      - name: Build original manager debug APK only
        run: |
          set -euo pipefail
          chmod +x ./gradlew

          ./gradlew :manager:assembleDebug \
            --stacktrace \
            --info \
            --no-daemon \
            --no-configuration-cache

      - name: Diagnose signing files after build
        if: always()
        run: |
          echo "=== find signing/key-like files after build ==="
          find . -maxdepth 5 -type f \( \
            -name 'signing.properties' -o \
            -name 'key.jks' -o \
            -name '*.jks' -o \
            -name '*.keystore' -o \
            -name '*.p12' -o \
            -name '*.pfx' \
          \) -print -exec ls -lah {} \; || true

          echo
          echo "=== key.jks after build ==="
          if [ -f key.jks ]; then
            file key.jks || true
            xxd -l 160 key.jks || true
          else
            echo "key.jks not found after build"
          fi

      - name: Collect APK and reports
        if: always()
        run: |
          mkdir -p out/apk out/reports

          find manager/build/outputs/apk -type f -name "*.apk" -exec cp -v {} out/apk/ \; || true

          if [ -d build/reports ]; then
            cp -a build/reports out/reports/root-reports || true
          fi

          if [ -d manager/build/reports ]; then
            cp -a manager/build/reports out/reports/manager-reports || true
          fi

          echo
          echo "=== collected files ==="
          find out -type f -print || true

          echo
          echo "=== apk dir ==="
          ls -lah out/apk || true

      - name: Upload original build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: original-shizuku-debug-output
          path: out/
