name: Build Custom Shizuku

on:
  workflow_dispatch:

env:
  NEW_APP_ID: "to.solame.privileged.api"
  NEW_APP_NAME: "Solame Privileged"
  NEW_PERMISSION_PREFIX: "to.solame.manager.permission"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Shizuku
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true

      - name: Patch identifiers, app name, icon, and signing
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import os

          new_app_id = os.environ["NEW_APP_ID"]
          new_app_name = os.environ["NEW_APP_NAME"]
          new_permission_prefix = os.environ["NEW_PERMISSION_PREFIX"]

          old_app_id = "moe.shizuku.privileged.api"
          old_permission_prefix = "moe.shizuku.manager.permission"

          roots = [
              "manager",
              "server",
              "shell",
              "starter",
              "common",
              "api",
              "provider",
              "rish",
          ]

          suffixes = {
              ".gradle", ".kts", ".kt", ".java", ".xml", ".aidl",
              ".cpp", ".c", ".h", ".properties", ".json", ".txt", ".md"
          }

          for root in roots:
              p = Path(root)
              if not p.exists():
                  continue

              for f in p.rglob("*"):
                  if not f.is_file():
                      continue
                  if "build" in f.parts or ".git" in f.parts:
                      continue
                  if f.suffix.lower() not in suffixes:
                      continue

                  s = f.read_text(errors="ignore")
                  old = s

                  s = s.replace(old_app_id, new_app_id)
                  s = s.replace(old_permission_prefix + ".", new_permission_prefix + ".")
                  s = s.replace(old_permission_prefix, new_permission_prefix)

                  if f.name == "strings.xml":
                      s = s.replace(">Shizuku<", f">{new_app_name}<")
                      s = s.replace(">Shizuku Manager<", f">{new_app_name}<")

                  if s != old:
                      f.write_text(s)

          manifest = Path("manager/src/main/AndroidManifest.xml")
          if manifest.exists():
              s = manifest.read_text(errors="ignore")
              s = s.replace("@mipmap/ic_launcher", "@drawable/ic_launcher_custom")
              s = s.replace("@mipmap/ic_launcher_round", "@drawable/ic_launcher_custom")
              manifest.write_text(s)

          drawable_dir = Path("manager/src/main/res/drawable")
          drawable_dir.mkdir(parents=True, exist_ok=True)

          (drawable_dir / "ic_launcher_custom.xml").write_text("""<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#222222"
                  android:pathData="M0,0h108v108h-108z" />
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M54,18a36,36 0,1 0,0.1 0M54,30a24,24 0,1 1,-0.1 0" />
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M50,38h8v32h-8zM42,50h24v8h-24z" />
          </vector>
          """)
          PY

          rm -f key.jks signing.properties custom-debug.jks

          keytool -genkeypair \
            -v \
            -keystore key.jks \
            -storetype PKCS12 \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Custom Shizuku,O=Custom,C=US"

          cat > signing.properties <<'EOF'
          KEYSTORE_FILE=key.jks
          KEYSTORE_PASSWORD=android
          KEYSTORE_ALIAS=androiddebugkey
          KEYSTORE_ALIAS_PASSWORD=android
          EOF

          echo "=== signing.properties ==="
          cat signing.properties

          echo "=== key.jks ==="
          ls -lah key.jks

          echo "=== keytool list ==="
          keytool -list \
            -keystore key.jks \
            -storepass android \
            -alias androiddebugkey

      - name: Verify patch result
        run: |
          set -euo pipefail

          echo "=== applicationId check ==="
          grep -RIn "$NEW_APP_ID" manager server shell starter common api provider rish \
            --exclude-dir=build \
            --exclude-dir=.git || true

          echo "=== old identifier check ==="
          if grep -RIn \
            "moe.shizuku.privileged.api\|moe.shizuku.manager.permission" \
            manager server shell starter common api provider rish \
            --exclude-dir=build \
            --exclude-dir=.git; then
            echo "Old package or permission identifiers still remain."
            exit 1
          fi

          echo "Identifier check passed."

      - name: Build debug APK
        run: |
          set -euo pipefail
          chmod +x ./gradlew

          ./gradlew \
            clean \
            :manager:assembleDebug \
            --stacktrace \
            --info \
            --no-daemon \
            --no-build-cache \
            --no-configuration-cache \
            --no-parallel

      - name: Collect APK and reports
        if: always()
        run: |
          mkdir -p out/apk out/reports

          find manager/build/outputs/apk -type f -name "*.apk" -exec cp -v {} out/apk/ \; || true
          find build/reports -type f -maxdepth 5 -print -exec cp --parents -v {} out/reports/ \; || true
          find manager/build/reports -type f -maxdepth 5 -print -exec cp --parents -v {} out/reports/ \; || true

          echo "=== APK files ==="
          find out -type f -print
          ls -lah out/apk || true

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custom-shizuku-build-output
          path: out/
